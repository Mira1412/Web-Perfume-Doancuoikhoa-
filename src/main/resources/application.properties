# Cấu hình cổng chạy Server Spring Boot (không liên quan đến cổng Apache của Laragon)
server.port=8081

# Cấu hình kết nối đến MySQL của Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/perfume_shop?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Hibernate tự động cập nhật bảng vào Laragon Database
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true