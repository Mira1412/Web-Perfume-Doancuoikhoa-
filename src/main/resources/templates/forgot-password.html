<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu — Halo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a96e;
            --dark: #0d0d1a;
            --dark-2: #141428;
            --border: rgba(201, 169, 110, 0.2);
        }

        body {
            background-color: var(--dark);
            font-family: 'Inter', sans-serif;
            color: #f0ece4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: var(--dark-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .brand-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 16px;
            border-radius: 10px;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: var(--gold);
            color: #fff;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .text-muted {
            color: rgba(255, 255, 255, 0.65) !important;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #a07840);
            color: #1a1a1a;
            font-weight: 600;
            border: none;
            padding: 12px;
            border-radius: 10px;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 169, 110, 0.3);
        }

        .text-muted a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <a href="/" class="brand-name">🌸 Halo</a>
        <h4 class="text-center mb-3" style="font-weight: 600;">Khôi phục mật khẩu</h4>
        <p class="text-center text-muted mb-4" style="font-size: 0.85rem; line-height: 1.5;">Vui lòng nhập Email tài
            khoản của bạn. Hệ thống sẽ tự động tạo và gửi một mật khẩu tạm thời mới về hòm thư này.</p>

        <div th:if="${errorMsg}" class="alert alert-danger"
            style="background: rgba(220,53,69,0.1); border-color: #ff6b6b; color: #ff6b6b; border-radius: 10px; font-size: 0.9rem;"
            th:text="${errorMsg}"></div>

        <form action="/forgot-password" method="POST">
            <div class="mb-4">
                <label class="form-label" style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">Email tài
                    khoản</label>
                <div class="input-group">
                    <span class="input-group-text"
                        style="background: rgba(0,0,0,0.2); border-color: rgba(255,255,255,0.1); color: var(--gold); border-right: none;"><i
                            class="bi bi-envelope"></i></span>
                    <input type="email" name="email" class="form-control" style="border-left: none;"
                        placeholder="vidu@gmail.com" required>
                </div>
            </div>

            <button type="submit" class="btn btn-gold">Gửi Yêu Cầu Khôi Phục</button>
        </form>

        <div class="text-center mt-4 text-muted" style="font-size: 0.9rem;">
            Quay lại trang <a href="/login">Đăng nhập</a>
        </div>
    </div>

</body>

</html>
