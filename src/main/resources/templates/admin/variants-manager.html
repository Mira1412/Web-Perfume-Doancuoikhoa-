<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Dung Tích — Halo Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a96e;
            --dark: #0d0d1a;
            --dark-2: #141428;
            --dark-3: #1c1c35;
            --text-primary: #f0ece4;
            --text-muted: rgba(240, 236, 228, 0.5);
            --border: rgba(201, 169, 110, 0.2);
        }

        body {
            background-color: var(--dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar-custom {
            background: rgba(13, 13, 26, 0.95);
            border-bottom: 1px solid var(--border);
        }

        .brand-name {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--gold) !important;
            text-decoration: none;
        }

        .page-header {
            background: linear-gradient(to right, var(--dark-2), var(--dark));
            border-bottom: 1px solid var(--border);
            padding: 40px 0 32px;
        }

        .card-custom {
            background: var(--dark-2);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .card-header-custom {
            background: rgba(201, 169, 110, 0.1);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            font-weight: 600;
            color: var(--gold);
        }

        .form-input {
            background: var(--dark-3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            width: 100%;
        }

        .form-input:focus {
            border-color: var(--gold);
            outline: none;
        }

        .table-custom {
            color: white;
            margin-bottom: 0;
        }

        .table-custom th {
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .table-custom td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: middle;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #a07840);
            color: #1a1a1a;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            color: #000;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar-custom py-3">
        <div class="container">
            <a class="brand-name" href="/admin/dashboard">🌸 Halo Admin</a>
        </div>
    </nav>

    <!-- Header -->
    <div class="page-header">
        <div class="container">
            <h1 style="font-size: 1.8rem; font-weight: 600; margin-bottom: 5px;">
                Quản lý Dung tích
            </h1>
            <p style="color: var(--gold); margin: 0; font-size: 1.1rem;">
                <i class="bi bi-box-seam"></i> Sản phẩm: <strong th:text="${perfume.ten_sp}">Tên SP</strong>
            </p>
        </div>
    </div>

    <!-- Content -->
    <div class="container py-5">
        <div class="row g-4">
            <!-- CỘT TRÁI: Form thêm biến thể -->
            <div class="col-md-4">
                <div class="card-custom">
                    <div class="card-header-custom">
                        <i class="bi bi-plus-circle"></i> Thêm dung tích mới
                    </div>
                    <div class="p-4">
                        <form th:action="@{'/admin/products/' + ${perfume.id_nuoc_hoa} + '/variants/add'}"
                            th:object="${newVariant}" method="post">
                            <div class="mb-3">
                                <label class="form-label text-muted" style="font-size: 0.85rem;">Tên dung tích</label>
                                <input type="text" class="form-input" th:field="*{dung_tich}"
                                    placeholder="VD: 50ml, 100ml..." required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted" style="font-size: 0.85rem;">Giá bán (VNĐ)</label>
                                <input type="number" class="form-input" th:field="*{gia_ban}"
                                    placeholder="Nhập số: 3500000" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted" style="font-size: 0.85rem;">Số lượng tồn
                                    kho</label>
                                <input type="number" class="form-input" th:field="*{so_luong_ton}" placeholder="VD: 10"
                                    required>
                            </div>
                            <button type="submit" class="btn-gold w-100">
                                LƯU DUNG TÍCH
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- CỘT PHẢI: Danh sách dung tích hiện có -->
            <div class="col-md-8">
                <div class="card-custom">
                    <div class="card-header-custom"
                        style="display: flex; justify-content: space-between; align-items: center;">
                        <span><i class="bi bi-list-ul"></i> Danh sách dung tích đang bán</span>
                        <a href="/admin/products" class="btn btn-sm btn-outline-light" style="font-size: 0.8rem;">
                            <i class="bi bi-arrow-left"></i> Về kho hàng
                        </a>
                    </div>
                    <div class="table-responsive p-3">
                        <table class="table table-borderless table-custom">
                            <thead>
                                <tr>
                                    <th>Dung tích</th>
                                    <th>Giá bán</th>
                                    <th>Tồn kho</th>
                                    <th class="text-end">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="v : ${variants}">
                                    <td th:text="${v.dung_tich}" style="font-weight: 600; color: var(--gold);">50ml</td>
                                    <td th:text="${#numbers.formatDecimal(v.gia_ban, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                        1.000.000 đ</td>
                                    <td>
                                        <span class="badge bg-success" th:if="${v.so_luong_ton > 0}"
                                            th:text="${v.so_luong_ton}">10</span>
                                        <span class="badge bg-danger" th:if="${v.so_luong_ton <= 0}">Hết hàng</span>
                                    </td>
                                    <td class="text-end">
                                        <a th:href="@{'/admin/variants/delete/' + ${v.id_bien_the}}"
                                            class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Bạn có chắc chắn muốn xóa dung tích này? Hành động này không thể hoàn tác.');"
                                            title="Xóa">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(variants)}">
                                    <td colspan="4" class="text-center py-5">
                                        <i class="bi bi-inboxes" style="font-size: 2rem; color: var(--border);"></i>
                                        <p class="mt-2 text-muted">Sản phẩm này chưa có dung tích nào.<br>Hãy thêm ở
                                            form bên trái.</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
