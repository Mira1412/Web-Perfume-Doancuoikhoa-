<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản trị sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h2 class="mb-4">Danh sách sản phẩm (Admin)</h2>
    <a href="/admin/products/add" class="btn btn-primary mb-3">+ Thêm sản phẩm mới</a>
    
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tên sản phẩm</th>
                <th>Giá</th>
                <th>Tồn kho</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${perfumes}">
                <td th:text="${p.id_nuoc_hoa}">1</td>
                <td th:text="${p.ten_sp}">Chanel...</td>
                <td th:text="${p.gia_ban}">2.000.000</td>
                <td th:text="${p.ton_kho}">10</td>
                <td>
                    <a th:href="@{'/admin/products/edit/' + ${p.id_nuoc_hoa}}" class="btn btn-sm btn-warning">Sửa</a>
                    <a th:href="@{'/admin/products/delete/' + ${p.id_nuoc_hoa}}" class="btn btn-sm btn-danger" onclick="return confirm('Chắc chắn xóa?')">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
