<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân — Halo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a96e;
            --gold-light: #e8d5b0;
            --gold-dark: #a07840;
            --dark: #0d0d1a;
            --dark-2: #141428;
            --dark-3: #1c1c35;
            --text-primary: #f0ece4;
            --text-muted: rgba(240, 236, 228, 0.7);
            --border: rgba(201, 169, 110, 0.2);
        }

        body {
            background-color: var(--dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }
        .navbar-custom {
            background: rgba(13, 13, 26, 0.95);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
        }

        .brand-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold) !important;
            text-decoration: none;
            letter-spacing: 1.5px;
            text-shadow: 0 0 10px rgba(201, 169, 110, 0.2);
        }
        .profile-container {
            margin-top: 50px;
            margin-bottom: 80px;
        }

        .card-custom {
            background: var(--dark-2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
        }

        .form-control {
            background: var(--dark-3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .form-control:focus {
            background: var(--dark-3);
            border-color: var(--gold);
            color: #fff;
            box-shadow: none;
        }

        .form-control:disabled,
        .form-control[readonly] {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #a07840);
            color: #1a1a1a;
            font-weight: 600;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 169, 110, 0.3);
        }

        .section-title {
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
    </style>
</head>

<body>

    <nav class="navbar-custom">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="brand-name" href="/">🌸 Halo</a>
            <a href="/" class="btn btn-outline-light btn-sm" style="border-color: var(--border); color: var(--gold);"><i
                    class="bi bi-house"></i> Về cửa hàng</a>
        </div>
    </nav>

    <div class="container profile-container">
        <!-- Flash Messages -->
        <div th:if="${successMsg}" class="alert alert-success"
            style="background: rgba(111,207,154,0.1); border-color: #6fcf97; color: #6fcf97;" th:text="${successMsg}">
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger"
            style="background: rgba(220,53,69,0.1); border-color: #ff6b6b; color: #ff6b6b;" th:text="${errorMsg}"></div>

        <div class="row g-4">
            <!-- Cột 1: Thông tin cá nhân -->
            <div class="col-md-7">
                <div class="card-custom">
                    <h3 class="section-title"><i class="bi bi-person-lines-fill"></i> Thông tin cá nhân</h3>
                    <form action="/profile/update" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted">Email (Không thể thay đổi)</label>
                            <input type="email" class="form-control" th:value="${user.email}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" name="fullName" th:value="${user.fullName}"
                                required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" class="form-control" name="phone" th:value="${user.phone}" placeholder="Nhập số điện thoại">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Địa chỉ giao hàng</label>
                            <textarea class="form-control" name="address" rows="3"
                                placeholder="Nhập địa chỉ mặc định" th:text="${user.address}"></textarea>
                        </div>
                        <button type="submit" class="btn btn-gold w-100">Cập nhật thông tin</button>
                    </form>
                </div>
            </div>

            <!-- Cột 2: Đổi mật khẩu -->
            <div class="col-md-5">
                <div class="card-custom">
                    <h3 class="section-title"><i class="bi bi-shield-lock"></i> Đổi mật khẩu</h3>
                    <form action="/profile/change-password" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu hiện tại</label>
                            <input type="password" class="form-control" name="oldPassword" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu mới</label>
                            <input type="password" class="form-control" name="newPassword" required minlength="6">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Xác nhận mật khẩu mới</label>
                            <input type="password" class="form-control" name="confirmPassword" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-outline-light w-100"
                            style="border-color: var(--gold); color: var(--gold);">Đổi mật khẩu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
