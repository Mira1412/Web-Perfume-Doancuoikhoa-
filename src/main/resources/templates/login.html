<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Halo</title>
    <meta name="description" content="Đăng nhập tài khoản thành viên tại Halo.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a96e;
            --gold-light: #e8d5b0;
            --gold-dark: #a07840;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 16px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(201, 169, 110, 0.12) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(80, 120, 200, 0.15) 0%, transparent 70%);
            bottom: -80px;
            right: -80px;
            border-radius: 50%;
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 169, 110, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 8px;
        }

        .brand-logo .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(201, 169, 110, 0.4);
        }

        .card-title-main {
            font-family: 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .card-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.85rem;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .alert-custom {
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 0.875rem;
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.4);
            color: #ff8a8a;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.4);
            color: #6fcf97;
        }

        .form-group-custom {
            margin-bottom: 20px;
        }

        .form-label-custom {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
            font-size: 16px;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(201, 169, 110, 0.25);
            border-radius: 12px;
            color: #ffffff;
            font-size: 0.9rem;
            padding: 14px 16px 14px 46px;
            transition: all 0.3s ease;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.15);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--gold);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border: none;
            border-radius: 12px;
            color: #1a1a1a;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #d4b880 0%, #b8863a 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(201, 169, 110, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .footer-links {
            margin-top: 28px;
            text-align: center;
        }

        .footer-links p {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.875rem;
            margin-bottom: 10px;
        }

        .footer-links a.link-gold {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-links a.link-gold:hover {
            color: var(--gold-light);
            text-decoration: underline;
        }

        .footer-links a.link-muted {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a.link-muted:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .card-title-main {
                font-size: 1.7rem;
            }
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- Logo -->
            <div class="brand-logo">
                <div class="logo-icon">🌸</div>
            </div>
            <h1 class="card-title-main">Chào Mừng Trở Lại</h1>
            <p class="card-subtitle">Đăng nhập để tiếp tục mua sắm</p>

            <!-- Thông báo thành công (sau khi đăng ký) -->
            <div th:if="${success}" class="alert-custom alert-success">
                <i class="bi bi-check-circle-fill" style="font-size: 18px; flex-shrink: 0; margin-top: 1px;"></i>
                <span th:text="${success}"></span>
            </div>

            <!-- Thông báo lỗi -->
            <div th:if="${errorMsg}" class="alert-custom alert-error">
                <i class="bi bi-exclamation-circle-fill" style="font-size: 18px; flex-shrink: 0; margin-top: 1px;"></i>
                <span th:text="${errorMsg}"></span>
            </div>
            
            <div th:if="${successMsg}" class="alert alert-success" style="background: rgba(111,207,154,0.1); border-color: #6fcf97; color: #6fcf97; border-radius: 10px; font-size: 0.9rem;" th:text="${successMsg}"></div>

            <!-- Form Đăng nhập -->
            <form action="/login" method="post">

                <!-- Email -->
                <div class="form-group-custom">
                    <label class="form-label-custom" for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="form-input" id="email" name="email" placeholder="example@gmail.com"
                            autocomplete="email" required>
                    </div>
                </div>

                <!-- Mật khẩu -->
                <div class="form-group-custom">
                    <label class="form-label-custom" for="password">Mật Khẩu</label>
                    <div class="input-wrapper">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-input" id="password" name="password"
                            placeholder="Nhập mật khẩu" autocomplete="current-password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()"
                            title="Hiện/Ẩn mật khẩu">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Đăng Nhập
                </button>
            </form>

            <!-- Links -->
            <div class="footer-links">
                <p>Chưa có tài khoản? <a href="/register" class="link-gold">Đăng ký ngay</a></p>
                <a href="/" class="link-muted"><i class="bi bi-arrow-left"></i> Quay lại trang chủ</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>

</html>
